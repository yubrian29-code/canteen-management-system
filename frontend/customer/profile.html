<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — Canteen System</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/customer.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar__brand" href="/customer/menu.html">
      <span class="navbar__brand-icon">🍽️</span>
      Canteen
    </a>
    <ul class="navbar__nav" id="main-nav">
      <li><a href="/customer/menu.html">Menu</a></li>
      <li><a href="/customer/history.html">My Orders</a></li>
      <li><a href="/customer/wallet.html">Wallet</a></li>
      <li><a href="/customer/profile.html" class="active">Profile</a></li>
    </ul>
    <div class="navbar__actions">
      <span class="navbar__user" id="nav-user"></span>
      <button class="btn btn--inverse btn--sm" onclick="clearSession()">Logout</button>
    </div>
  </nav>

  <main class="page">
    <h1 class="page-title">Profile</h1>
    <div class="profile-layout">

      <!-- Account details (read-only) -->
      <div class="card">
        <h2 class="font-bold mb-2" style="font-size:1rem">Account Details</h2>
        <div class="form-group">
          <label>School / Staff ID</label>
          <input type="text" id="pf-schoolId" disabled>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="pf-name" disabled>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <input type="text" id="pf-userType" disabled>
        </div>
        <div class="form-group">
          <label>Role</label>
          <input type="text" id="pf-role" disabled>
        </div>
      </div>

      <!-- Change password -->
      <div class="card">
        <h2 class="font-bold mb-2" style="font-size:1rem">Change Password</h2>
        <div id="pw-error" class="form-error hidden"></div>
        <form id="password-form">
          <div class="form-group">
            <label for="pw-old">Current Password</label>
            <input type="password" id="pw-old" required>
          </div>
          <div class="form-group">
            <label for="pw-new">New Password</label>
            <input type="password" id="pw-new" minlength="6" placeholder="Min. 6 characters" required>
          </div>
          <div class="form-group">
            <label for="pw-confirm">Confirm New Password</label>
            <input type="password" id="pw-confirm" minlength="6" required>
          </div>
          <button type="submit" class="btn btn--primary" id="pw-btn">Update Password</button>
        </form>
      </div>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const session = guardPage('CUSTOMER');
    document.getElementById('nav-user').textContent = session.schoolId;

    async function loadProfile() {
      try {
        const p = await api.getProfile(session.schoolId);
        document.getElementById('pf-schoolId').value = p.schoolId;
        document.getElementById('pf-name').value = p.name;
        document.getElementById('pf-userType').value = p.userType;
        document.getElementById('pf-role').value = p.role;
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('pw-btn');
      const errEl = document.getElementById('pw-error');
      errEl.classList.add('hidden');

      const newPw = document.getElementById('pw-new').value;
      const confirm = document.getElementById('pw-confirm').value;
      if (newPw.length < 6) {
        errEl.textContent = 'New password must be at least 6 characters';
        errEl.classList.remove('hidden');
        return;
      }
      if (newPw !== confirm) {
        errEl.textContent = 'New passwords do not match';
        errEl.classList.remove('hidden');
        return;
      }

      setLoading(btn, true);
      try {
        const res = await api.changePassword(session.schoolId, {
          oldPassword: document.getElementById('pw-old').value,
          newPassword: newPw,
          confirmNewPassword: confirm,
        });
        showToast(res?.message || 'Password changed', 'success');
        document.getElementById('password-form').reset();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      } finally {
        setLoading(btn, false);
      }
    });

    loadProfile();
  </script>
</body>
</html>
