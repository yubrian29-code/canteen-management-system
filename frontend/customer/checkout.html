<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout — Canteen System</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/customer.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar__brand" href="/customer/menu.html">
      <span class="navbar__brand-icon">🍽️</span>
      Canteen
    </a>
    <ul class="navbar__nav" id="main-nav">
      <li><a href="/customer/menu.html">Menu</a></li>
      <li><a href="/customer/history.html">My Orders</a></li>
      <li><a href="/customer/wallet.html">Wallet</a></li>
      <li><a href="/customer/profile.html">Profile</a></li>
    </ul>
    <div class="navbar__actions">
      <span class="navbar__user" id="nav-user"></span>
      <button class="btn btn--inverse btn--sm" onclick="clearSession()">Logout</button>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1 class="page-title" style="margin:0">Checkout</h1>
      <a href="/customer/menu.html" class="btn btn--secondary btn--sm">← Back to Menu</a>
    </div>

    <div id="empty-cart" class="empty-state hidden">
      <div class="empty-state__icon">🛒</div>
      <div class="empty-state__title">Your cart is empty</div>
      <a href="/customer/menu.html" class="btn btn--primary mt-2">Browse Menu</a>
    </div>

    <div id="checkout-content" class="checkout-layout hidden">
      <!-- Order summary -->
      <div class="card">
        <div class="section-heading" style="margin-bottom:.85rem">Order Summary</div>
        <div id="order-items"></div>
        <div class="checkout-total">
          <span>Total</span>
          <span class="checkout-total__amount" id="order-total"></span>
        </div>
        <div class="form-group mt-2">
          <label for="remark">Special Instructions (optional)</label>
          <textarea id="remark" placeholder="e.g. No chilli, extra rice…"></textarea>
        </div>
      </div>

      <!-- Payment -->
      <div>
        <div class="card mb-2">
          <div class="section-heading" style="margin-bottom:.85rem">Payment Method</div>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="WALLET" checked onchange="onPaymentChange()">
              <span class="payment-option__icon">💳</span>
              <div>
                <div class="payment-option__label">Wallet</div>
                <div class="payment-option__sub">Balance: <span id="wallet-balance">loading…</span></div>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="CASH" onchange="onPaymentChange()">
              <span class="payment-option__icon">💵</span>
              <div>
                <div class="payment-option__label">Cash</div>
                <div class="payment-option__sub">Pay at counter on pickup</div>
              </div>
            </label>
          </div>
          <div id="wallet-warning" class="alert alert--error hidden mt-1" style="margin-bottom:0">
            Insufficient wallet balance. Please top up or pay by cash.
          </div>
        </div>

        <button class="btn btn--primary btn--block btn--lg" id="place-btn" onclick="placeOrder()">
          Place Order →
        </button>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const session = guardPage('CUSTOMER');
    document.getElementById('nav-user').textContent = session.schoolId;

    let walletBalance = null;

    function init() {
      const items = cartStore.get();
      if (!items.length) {
        document.getElementById('empty-cart').classList.remove('hidden');
        return;
      }
      document.getElementById('checkout-content').classList.remove('hidden');

      document.getElementById('order-items').innerHTML = items.map(i => `
        <div class="checkout-summary-item">
          <span>${i.name} × ${i.quantity}</span>
          <span style="font-weight:700">${formatCurrency(i.price * i.quantity)}</span>
        </div>`).join('');
      document.getElementById('order-total').textContent = formatCurrency(cartStore.total());

      loadWallet();
    }

    async function loadWallet() {
      try {
        const w = await api.getWallet(session.id);
        walletBalance = parseFloat(w.balance);
        document.getElementById('wallet-balance').textContent = formatCurrency(walletBalance);
        onPaymentChange();
      } catch {
        document.getElementById('wallet-balance').textContent = 'unavailable';
        walletBalance = null;
      }
    }

    function onPaymentChange() {
      const method = document.querySelector('input[name="payment"]:checked')?.value;
      const total = cartStore.total();
      const warning = document.getElementById('wallet-warning');
      const placeBtn = document.getElementById('place-btn');

      if (method === 'WALLET' && walletBalance !== null && walletBalance < total) {
        warning.classList.remove('hidden');
        placeBtn.disabled = true;
      } else {
        warning.classList.add('hidden');
        placeBtn.disabled = false;
      }
    }

    async function placeOrder() {
      const btn = document.getElementById('place-btn');
      const items = cartStore.get();
      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
      const remark = document.getElementById('remark').value.trim();

      const orderData = {
        userId: session.id,
        orderTime: new Date().toISOString(),
        totalAmount: cartStore.total(),
        paymentMethod,
        remark,
        items: items.map(i => ({
          menuItemId: i.itemId,
          name: i.name,
          priceAtPurchase: i.price,
          quantity: i.quantity,
          subTotal: i.price * i.quantity,
        })),
      };

      setLoading(btn, true);
      try {
        const res = await api.placeOrder(session.id, orderData);
        cartStore.clear();
        showToast('Order placed! 🎉', 'success');
        setTimeout(() => location.replace(`/customer/tracking.html?orderId=${res.orderId}`), 800);
      } catch (err) {
        showToast(err.message || 'Failed to place order', 'error');
        setLoading(btn, false);
      }
    }

    init();
  </script>
</body>
</html>
