# ── Database (Supabase) ───────────────────────────────────────────
# Set these as environment variables in Railway dashboard.
# Supabase → Project Settings → Database → Connection parameters
#
#   DB_HOST     = db.<project-ref>.supabase.co
#   DB_PORT     = 5432
#   DB_NAME     = postgres
#   DB_USERNAME = postgres
#   DB_PASSWORD = <your-db-password>
#

# spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Server ────────────────────────────────────────────────────────
# Railway injects PORT automatically
server.port=${PORT:8080}

# ── Actuator (Railway health check) ──────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never